<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haunt Nights Jax</title>
    <meta name="description" content="Haunt Nights Jax — Jacksonville's haunted house experience. New scares coming soon.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --blood: #cc0000; --blood-dark: #8b0000;
            --blood-bright: #ff1a1a; --black: #000; --bone: #c8c0b4;
        }
        html, body { height: 100%; overflow: hidden; background: var(--black); }
        body {
            background: var(--black); color: var(--bone);
            font-family: 'Special Elite', monospace;
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .blood-streaks { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
        .streak {
            position: absolute; top: -5%; width: 2px;
            background: linear-gradient(to bottom, var(--blood-dark), var(--blood), transparent);
            opacity: 0; animation: bleed linear forwards;
        }
        @keyframes bleed { 0%{height:0;opacity:.7} 60%{opacity:.5} 100%{height:40vh;opacity:0} }
        .scratches { position: fixed; inset: 0; pointer-events: none; z-index: 2; opacity: 0.06; }
        .scratch { position: absolute; width: 1px; background: rgba(255,255,255,0.5); transform-origin: top center; }
        .grain {
            position: fixed; inset: 0; pointer-events: none; z-index: 10; opacity: 0.5;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
            background-size: 128px 128px; mix-blend-mode: overlay;
        }
        .vignette {
            position: fixed; inset: 0; pointer-events: none; z-index: 3;
            background: radial-gradient(ellipse 55% 50% at center, transparent 10%, rgba(0,0,0,0.85) 100%);
        }
        .hellglow {
            position: fixed; bottom: -20%; left: -10%; right: -10%; height: 60%;
            pointer-events: none; z-index: 1;
            background: radial-gradient(ellipse 80% 40% at 50% 100%, rgba(139,0,0,0.08), transparent);
            animation: hellpulse 6s ease-in-out infinite;
        }
        @keyframes hellpulse { 0%,100%{opacity:.5} 50%{opacity:1} }
        .content { position: relative; z-index: 5; text-align: center; padding: 2rem; max-width: 750px; overflow-wrap: break-word; }
        .tape {
            display: inline-block;
            background: repeating-linear-gradient(-45deg, #111, #111 10px, #b8960a 10px, #b8960a 20px);
            padding: 0.35rem 1.8rem; margin-bottom: 2rem;
            font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase;
            color: #111; transform: rotate(-2deg);
            animation: fadeSlideDown 0.8s ease-out 0.2s both;
            box-shadow: 0 2px 20px rgba(0,0,0,0.8);
        }
        .title {
            font-family: 'Creepster', cursive; font-size: clamp(3.5rem, 12vw, 8rem);
            line-height: 0.9; color: var(--blood);
            text-shadow: 0 0 10px rgba(204,0,0,0.8), 0 0 40px rgba(139,0,0,0.6),
                0 0 80px rgba(139,0,0,0.3), 0 0 120px rgba(139,0,0,0.15),
                3px 3px 0 #220000, -1px -1px 0 #440000;
            margin-bottom: 0.2rem; position: relative;
            width: max-content; max-width: 100vw; margin-left: auto; margin-right: auto;
            animation: fadeSlideUp 1s ease-out 0.4s both, textFlicker 8s ease-in-out 3s infinite;
        }
        .title::before, .title::after {
            content: attr(data-text); position: absolute; inset: 0; overflow: hidden;
        }
        .title::before {
            color: var(--blood-bright); animation: glitch1 4s infinite linear;
            clip-path: inset(0 0 85% 0); text-shadow: -2px 0 #ff0000;
        }
        .title::after {
            color: var(--blood-dark); animation: glitch2 4s infinite linear;
            clip-path: inset(85% 0 0 0); text-shadow: 2px 0 #880000;
        }
        @keyframes glitch1 { 0%,93%,100%{transform:translate(0)} 94%{transform:translate(-3px,1px)} 95%{transform:translate(2px,-1px)} 96%{transform:translate(0)} }
        @keyframes glitch2 { 0%,96%,100%{transform:translate(0)} 97%{transform:translate(3px,-1px)} 98%{transform:translate(-2px,2px)} 99%{transform:translate(0)} }
        @keyframes textFlicker { 0%,100%{opacity:1} 50.5%{opacity:1} 51%{opacity:.4} 51.5%{opacity:1} 72%{opacity:1} 72.3%{opacity:.7} 72.6%{opacity:1} }
        .subtitle {
            font-size: clamp(0.6rem, 2vw, 0.85rem); letter-spacing: 0.5em;
            text-transform: uppercase; color: rgba(200,192,180,0.3); margin-top: 0.5rem;
            animation: fadeIn 1s ease-out 0.8s both;
        }
        .divider {
            width: 120px; height: 2px; margin: 2rem auto; position: relative;
            animation: fadeIn 1s ease-out 1.1s both;
            background: linear-gradient(90deg, transparent, var(--blood), transparent);
            box-shadow: 0 0 15px rgba(139,0,0,0.4), 0 0 30px rgba(139,0,0,0.2);
        }
        .message {
            font-size: clamp(0.85rem, 2.5vw, 1.05rem); line-height: 1.8;
            color: rgba(200,192,180,0.5); max-width: 440px; margin: 0 auto 2.5rem;
            animation: fadeSlideUp 1s ease-out 1.3s both; letter-spacing: 0.03em;
        }
        .message strong { color: var(--blood); font-weight: normal; text-shadow: 0 0 15px rgba(204,0,0,0.4); }
        .cta, .cta-primary {
            display: inline-block; font-size: 0.75rem; letter-spacing: 0.25em;
            text-transform: uppercase; color: rgba(180,160,150,0.7);
            border: 1px solid rgba(160,30,30,0.5); padding: 0.7rem 2rem;
            text-decoration: none; transition: all 0.3s ease;
            position: relative; overflow: hidden; font-family: 'Special Elite', monospace;
            background: transparent;
        }
        .cta::before, .cta-primary::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent, rgba(139,0,0,0.1), transparent);
            transform: translateX(-100%); transition: transform 0.5s ease;
        }
        .cta:hover, .cta-primary:hover {
            color: #d44;  border-color: #a22;
            box-shadow: 0 0 20px rgba(139,0,0,0.25), inset 0 0 20px rgba(139,0,0,0.05);
            text-shadow: 0 0 8px rgba(180,30,30,0.4);
        }
        .cta:hover::before, .cta-primary:hover::before { transform: translateX(100%); }
        .cta-group { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; animation: fadeIn 1s ease-out 1.7s both; }
        .cta-group a { min-width: 260px; text-align: center; }
        .announcement {
            font-family: 'Creepster', cursive;
            font-size: clamp(1.5rem, 5vw, 2.8rem);
            color: var(--blood); letter-spacing: 0.08em;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(204,0,0,0.6), 0 0 30px rgba(139,0,0,0.3);
            margin: 0.5rem 0;
            animation: fadeSlideUp 1s ease-out 1s both, textFlicker 8s ease-in-out 5s infinite;
        }
        .footer {
            position: fixed; bottom: 1.2rem; left: 0; right: 0; text-align: center;
            z-index: 5; font-size: 0.6rem; letter-spacing: 0.15em;
            color: rgba(200,192,180,0.1); animation: fadeIn 1s ease-out 2.2s both;
        }
        .particles { position: fixed; inset: 0; pointer-events: none; z-index: 4; overflow: hidden; }
        .particle { position: absolute; border-radius: 50%; animation: rise linear infinite; }
        @keyframes rise {
            0%{transform:translateY(100vh) translateX(0) scale(1);opacity:0}
            5%{opacity:1} 70%{opacity:.8}
            100%{transform:translateY(-10vh) translateX(40px) scale(0.4);opacity:0}
        }
        @keyframes fadeSlideUp { from{opacity:0;transform:translateY(25px)} to{opacity:1;transform:translateY(0)} }
        @keyframes fadeSlideDown { from{opacity:0;transform:translateY(-15px) rotate(-2deg)} to{opacity:1;transform:translateY(0) rotate(-2deg)} }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        @media (max-width: 480px) {
            .tape { padding: 0.3rem 1rem; font-size: 0.6rem; }
            .title { width: auto; font-size: clamp(4rem, 18vw, 6rem); line-height: 0.95; }
            .message { padding: 0 1rem; }
            .announcement { padding: 0 1rem; font-size: clamp(1.2rem, 4.5vw, 2rem); }
        }
    </style>
</head>
<body>
    <div class="blood-streaks" id="streaks"></div>
    <div class="scratches" id="scratches"></div>
    <div class="hellglow"></div>
    <div class="vignette"></div>
    <div class="grain"></div>
    <div class="particles" id="particles"></div>
    <main class="content">
        <h1 class="title" data-text="Haunt Nights">Haunt Nights</h1>
        <div class="subtitle">Jacksonville, FL</div>
        <div class="divider"></div>
        <div class="announcement">Not April Fools — We're Back!</div>
        <div class="divider"></div>
        <p class="message">
            We're building something <strong>terrifying</strong>.<br>
            New scares. New nightmares.<br>
            <strong>Coming Soon.</strong>
        </p>
        <div class="cta-group">
            <a href="mailto:hauntnightsjax@gmail.com" class="cta">Contact Us →</a>
            <a href="https://form.jotform.com/260156163701146" target="_blank" class="cta-primary">Join the Mailing List →</a>
        </div>
    </main>
    <footer class="footer">hauntnightsjax.com</footer>
    <script>
        const particles = document.getElementById('particles');
        for (let i = 0; i < 35; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = 1.5 + Math.random() * 3;
            const isRed = Math.random() > 0.25;
            p.style.cssText = `left:${Math.random()*100}%;width:${size}px;height:${size}px;background:${isRed?`rgba(${180+Math.random()*75},${Math.random()*30},0,${.4+Math.random()*.5})`:`rgba(255,${120+Math.random()*80},0,${.25+Math.random()*.3})`};box-shadow:0 0 ${4+Math.random()*6}px ${isRed?'rgba(200,0,0,.5)':'rgba(255,140,0,.35)'};animation-duration:${8+Math.random()*14}s;animation-delay:${Math.random()*10}s;`;
            particles.appendChild(p);
        }
        const streaks = document.getElementById('streaks');
        for (let i = 0; i < 8; i++) {
            const s = document.createElement('div');
            s.className = 'streak';
            s.style.cssText = `left:${10+Math.random()*80}%;width:${1+Math.random()*2.5}px;animation-duration:${4+Math.random()*6}s;animation-delay:${1+Math.random()*12}s;animation-iteration-count:infinite;opacity:0;`;
            streaks.appendChild(s);
        }
        const scratchContainer = document.getElementById('scratches');
        for (let i = 0; i < 12; i++) {
            const s = document.createElement('div');
            s.className = 'scratch';
            const h = 30 + Math.random() * 80;
            s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;height:${h}px;transform:rotate(${-15+Math.random()*30}deg);`;
            scratchContainer.appendChild(s);
        }
    </script>
